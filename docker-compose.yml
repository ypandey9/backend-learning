version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    command: npm run dev

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: node_worker
    env_file:
      - .env
    depends_on:
      - redis
      - mongo

  mongo:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  mongo_data: